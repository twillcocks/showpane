name: Deprecate Old CLI Versions

on:
  workflow_dispatch:

jobs:
  deprecate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Deprecate old versions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          MESSAGE="Pre-launch version superseded by 0.4.0. Upgrade to >=0.4.0."
          npm deprecate showpane@0.0.1 "$MESSAGE"
          npm deprecate showpane@0.2.0 "$MESSAGE"
          npm deprecate showpane@0.2.1 "$MESSAGE"
          npm deprecate showpane@0.3.0 "$MESSAGE"
          npm deprecate showpane@0.3.1 "$MESSAGE"
